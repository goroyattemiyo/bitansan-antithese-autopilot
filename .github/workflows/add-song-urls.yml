name: Add Song URLs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-song-urls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Add song URLs
        run: python -m src.add_song_urls

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/schedule.yml posts/schedules
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: add song urls to scheduled posts"
            git push
          fi
