name: Process Image Zip

on:
  workflow_dispatch:
    inputs:
      upload:
        description: "Write public GitHub raw image URLs to schedule files"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      delete_zip:
        description: "Delete processed ZIP/image files from incoming/"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      quality:
        description: "WebP quality"
        required: false
        default: "90"

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process incoming ZIP/images
        run: |
          ARGS="--quality ${{ github.event.inputs.quality }}"
          if [ "${{ github.event.inputs.upload }}" = "false" ]; then
            ARGS="$ARGS --no-upload"
          fi
          if [ "${{ github.event.inputs.delete_zip }}" = "true" ]; then
            ARGS="$ARGS --delete-zip"
          fi

          python -m src.process_image_zip $ARGS

      - name: Commit processed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/webp posts/image_urls.yml posts/schedule.yml posts/schedules incoming

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: process incoming images"
            git push
          fi
