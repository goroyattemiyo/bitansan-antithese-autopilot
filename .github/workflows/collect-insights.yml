name: Collect Insights

on:
  schedule:
    # JST Monday 21:07. GitHub Actions cron is UTC.
    - cron: "7 12 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of recent posted logs to inspect"
        required: false
        default: "30"
      active_days:
        description: "Collect posts published within this many days"
        required: false
        default: "30"
      request_delay_seconds:
        description: "Delay between Threads insight requests"
        required: false
        default: "1.0"
      force:
        description: "Collect again even if today's JST snapshot already exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: bikansan-collect-insights
  cancel-in-progress: false

jobs:
  collect:
    # Scheduled API access stays paused until this repository variable is true.
    # Manual runs remain available for explicit checks.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.THREADS_AUTOMATION_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Collect insights
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          ACTIVE_DAYS="${{ github.event.inputs.active_days }}"
          REQUEST_DELAY_SECONDS="${{ github.event.inputs.request_delay_seconds }}"
          if [ -z "$LIMIT" ]; then LIMIT=30; fi
          if [ -z "$ACTIVE_DAYS" ]; then ACTIVE_DAYS=30; fi
          if [ -z "$REQUEST_DELAY_SECONDS" ]; then REQUEST_DELAY_SECONDS=1.0; fi
          ARGS=(--limit "$LIMIT" --active-days "$ACTIVE_DAYS" --request-delay-seconds "$REQUEST_DELAY_SECONDS")
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          python -m src.collect_insights "${ARGS[@]}"
        env:
          BIKANSAN_ACCESS_TOKEN: ${{ secrets.BIKANSAN_ACCESS_TOKEN }}
          BIKANSAN_USER_ID: ${{ secrets.BIKANSAN_USER_ID }}
      - name: Commit insights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/insights/ posts/insights_latest.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: collect bikansan Threads insights"
            git push
          fi
