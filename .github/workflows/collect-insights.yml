name: Collect Insights

on:
  schedule:
    # JST daily 21:07. GitHub Actions cron is UTC.
    - cron: "7 12 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of recent posted logs to inspect"
        required: false
        default: "30"
      force:
        description: "Collect again even if today's JST snapshot already exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: bikansan-collect-insights
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Collect insights
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then LIMIT=30; fi
          ARGS=(--limit "$LIMIT")
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          python -m src.collect_insights "${ARGS[@]}"
        env:
          BIKANSAN_ACCESS_TOKEN: ${{ secrets.BIKANSAN_ACCESS_TOKEN }}
          BIKANSAN_USER_ID: ${{ secrets.BIKANSAN_USER_ID }}
      - name: Commit insights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/insights_log.yml posts/insights_latest.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: collect bikansan Threads insights"
            git push
          fi
