name: Collect Insights On Demand

on:
  push:
    branches:
      - main
    paths:
      - "control/collect_insights.yml"

permissions:
  contents: write

concurrency:
  group: bikansan-collect-insights
  cancel-in-progress: false

jobs:
  collect:
    # Keep this variable unset or false while the Threads account is under review.
    # A request-file update alone never accesses Threads unless this explicit gate is true.
    if: ${{ vars.THREADS_INSIGHTS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          # Always read the latest request/state. This also makes workflow reruns
          # idempotent after the first successful run committed its state.
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Process chat insight request
        run: python -m src.process_insights_request
        env:
          BIKANSAN_ACCESS_TOKEN: ${{ secrets.BIKANSAN_ACCESS_TOKEN }}
          BIKANSAN_USER_ID: ${{ secrets.BIKANSAN_USER_ID }}
      - name: Commit insights and request state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/insights/ posts/insights_latest.yml control/collect_insights_state.yml
          if git diff --cached --quiet; then
            echo "No changes to commit. Request was disabled or already processed."
          else
            git commit -m "chore: process Threads insights request"
            git push
          fi
