name: Split Schedule

on:
  workflow_dispatch:
    inputs:
      overwrite:
        description: "Overwrite existing weekly schedule files"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Split schedule
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.overwrite }}" = "true" ]; then
            ARGS="--overwrite"
          fi
          python -m src.split_schedule $ARGS

      - name: Commit weekly schedules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/schedules
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: split schedule into weekly files"
            git push
          fi
