name: Post Scheduler

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # Weekday morning posts: 07:15 JST -> checks at 07:10, 07:20, 07:35 JST.
    - cron: '10,20,35 22 * * 0-4'
    # Weekend morning posts: 09:15 JST -> checks at 09:10, 09:20, 09:35 JST.
    - cron: '10,20,35 0 * * 5,6'
    # Evening posts: 20:15 JST -> checks at 20:10, 20:20, 20:35 JST.
    - cron: '10,20,35 11 * * *'
  workflow_dispatch:
    inputs:
      post_id:
        description: 'Stable schedule id. Empty selects the next due post.'
        required: false
        default: ''
      allow_out_of_order:
        description: 'Allow manual out-of-order posting'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      dry_run:
        description: 'Do not publish or update YAML'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

concurrency:
  group: bitansan-post-scheduler
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Configure progress commits
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
      - name: Check schedules and post at most one parent
        shell: bash
        run: |
          args=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then args+=(--dry-run); fi
            if [ -n "${{ github.event.inputs.post_id }}" ]; then args+=(--id "${{ github.event.inputs.post_id }}"); fi
            if [ "${{ github.event.inputs.allow_out_of_order }}" = "true" ]; then args+=(--allow-out-of-order); fi
          fi
          python -m src.post_scheduler "${args[@]}"
        env:
          BIKANSAN_ACCESS_TOKEN: ${{ secrets.BIKANSAN_ACCESS_TOKEN }}
          BIKANSAN_USER_ID: ${{ secrets.BIKANSAN_USER_ID }}
          CATBOX_USERHASH: ${{ secrets.CATBOX_USERHASH }}
          AUTO_COMMIT_PROGRESS: 'true'
      - name: Commit remaining schedule changes
        if: always()
        run: |
          git add posts/schedule.yml posts/schedules posts/posted_log.yml
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'chore: record scheduler result'
            git push
          fi
